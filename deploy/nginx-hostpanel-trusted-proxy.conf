# HostPanel — real client IP in access logs when traffic passes through a trusted reverse proxy.
# Installed by install.sh / scripts/apply-nginx-trusted-proxy.sh from HOSTPANEL_TRUSTED_PROXY_IPS in .env
#
# Example .env:
#   HOSTPANEL_TRUSTED_PROXY_IPS=192.168.1.187,192.168.1.228,127.0.0.1
#
# Reload: sudo nginx -t && sudo nginx -s reload

set_real_ip_from 192.168.1.187;
set_real_ip_from 192.168.1.228;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;
